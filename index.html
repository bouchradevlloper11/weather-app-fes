<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Weather - Fes</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
       :root {
    /* الخلفية الكبيرة ديال الصفحة (موف مغلوق) */
    --bg-page: #2d132c;         
    
    /* خلفية البطاقة (موف متوسط ومنسجم) */
    --card-bg: #4a0e4e;         
    
    /* لون الحاوية ديال البيانات والساعات (موف مفتوح) */
    --data-box: #814086;        
    
    /* ألوان النصوص */
    --text-white: #ffffff;
    --text-light: #e0e0e0;
    
    /* لون المنحنى (الخط) غانخليوه أبيض أو وردي فاتح باش يبان */
    --graph-color: #f8bbd0;
}

body { 
    background-color: var(--bg-page); 
    font-family: 'Roboto', Arial, sans-serif; 
    display: flex; 
    justify-content: center; 
    padding-top: 50px; 
    margin: 0;
    color: var(--text-white);
}

.google-card { 
    width: 620px; 
    background-color: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 20px; 
    padding: 30px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
}

.header h1 { 
    font-size: 26px; 
    color: var(--text-white); 
    margin-bottom: 5px;
}

.header p {
    color: var(--text-light);
    font-size: 15px;
}

.temp-val { 
    font-size: 72px; 
    color: var(--text-white); 
    font-weight: bold;
}

/* هادي هي البلاصة اللي فيها البيانات (موف مفتوح) */
.details { 
    background-color: var(--data-box);
    padding: 15px;
    border-radius: 12px;
    color: var(--text-white);
    line-height: 1.8;
}

/* تنسيق الأيام لتحت (موف مفتوح) */
.days-row { 
    display: flex; 
    justify-content: space-between; 
    margin-top: 25px;
}

.day-item {
    background-color: var(--data-box); /* موف مفتوح */
    padding: 10px;
    border-radius: 10px;
    width: 13%;
    text-align: center;
}

.day-name { 
    color: #ffc1fa; /* وردي فاتح بزاف باش يبان */
    font-weight: bold; 
}

.day-temp-max {
    color: white;
    font-weight: bold;
}
    </style>
</head>
<body>

<div class="google-card">
    <div class="header">
        <h1>{{ weather.city }}</h1>
        <p>{{ weather.date }} • {{ weather.desc }}</p>
    </div>

    <div class="main-weather">
        <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@4x.png" width="80">
        <div class="temp-val">{{ weather.temp }}<span class="unit">°C</span></div>
        <div class="details">
            Humidity: {{ weather.humidity }}%<br>
            Wind: {{ weather.wind }} km/h
        </div>
    </div>

    <div class="chart-wrap">
        <canvas id="tempChart"></canvas>
    </div>

    <div class="days-row">
        {% for day in forecast %}
        <div class="day-item">
            <div class="day-name">{{ day.day }}</div>
            <img src="http://openweathermap.org/img/wn/{{ day.icon }}.png" width="35">
            <div style="color:#202124; font-weight:bold;">{{ day.temp }}°</div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
   // قلبي على هاد الجزء وسط ملف index.html وعوضيه
const ctx = document.getElementById('tempChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: [{% for h in hourly %} '{{ h.time }}', {% endfor %}],
        datasets: [{
            data: [{% for h in hourly %} {{ h.temp }}, {% endfor %}],
            
            // 1. لون الخط (المنحنى) - درتو ليك وردي فاتح (Rose) باش يبان واعر مع الموف
            borderColor: '#ffc1fa', 
            
            // 2. لون التضليل تحت الخط (موف شفاف)
            backgroundColor: 'rgba(255, 193, 250, 0.2)', 
            
            fill: true,           // ضروري باش يبان اللون اللي تحت الخط
            tension: 0.4,         // باش يجي الخط منحني وسلس
            pointRadius: 4,       // كبرنا النقط ديال الساعات شوية
            pointBackgroundColor: '#ffffff', // النقط باللون الأبيض باش يبريو
            borderWidth: 3        // غلظنا الخط شوية باش يبان واضح
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { 
            y: { 
                display: false // كنخبيو الأرقام اللي فالعرض باش يبقى الشكل نقي
            }, 
            x: { 
                grid: { display: false }, 
                ticks: { 
                    color: '#ffffff', // لون أرقام الساعات (01:00...) رديتو أبيض باش يبان فالموف
                    font: { size: 11, weight: 'bold' } 
                } 
            } 
        },
        maintainAspectRatio: false
    }
}); 
</script>

</body>
</html>
